<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Environments</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        padding: 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      header h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        color: #f8fafc;
      }

      header p {
        color: #94a3b8;
        margin-top: 0.5rem;
        font-size: 0.95rem;
      }

      .rooms {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 1.5rem;
        max-width: 900px;
        margin: 0 auto;
      }

      .room-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.5rem;
        transition: border-color 0.2s;
      }

      .room-card:hover {
        border-color: #475569;
      }

      .room-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
      }

      .room-name {
        font-size: 1.25rem;
        font-weight: 600;
        color: #f1f5f9;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .status-badge.online {
        background: #064e3b;
        color: #6ee7b7;
      }

      .status-badge.offline {
        background: #7f1d1d;
        color: #fca5a5;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .status-badge.online .status-dot {
        background: #34d399;
      }

      .status-badge.offline .status-dot {
        background: #f87171;
      }

      .readings {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .reading {
        background: #0f172a;
        border-radius: 8px;
        padding: 1rem;
      }

      .reading-label {
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 0.35rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .reading-value {
        font-size: 1.75rem;
        font-weight: 700;
        color: #f8fafc;
      }

      .reading-value .unit {
        font-size: 1rem;
        color: #64748b;
        font-weight: 400;
      }

      .room-footer {
        margin-top: 1rem;
        font-size: 0.8rem;
        color: #64748b;
        text-align: right;
      }

      .loading {
        text-align: center;
        color: #64748b;
        padding: 3rem;
        font-size: 1.1rem;
      }

      @media (max-width: 480px) {
        body {
          padding: 1rem;
        }

        .rooms {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Home Environments</h1>
      <p>Real-time sensor monitoring</p>
    </header>

    <div id="rooms" class="rooms">
      <div class="loading">Loading sensor data&hellip;</div>
    </div>

    <script type="module">
      const container = document.getElementById("rooms");

      function formatLastUpdated(seconds) {
        if (seconds < 60) return `${seconds.toFixed(0)}s ago`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
        return `${Math.floor(seconds / 3600)}h ago`;
      }

      function renderSensors(sensors) {
        container.innerHTML = sensors
          .map(
            (s) => `
          <div class="room-card">
            <div class="room-header">
              <span class="room-name">${s.name}</span>
              <span class="status-badge ${s.online ? "online" : "offline"}">
                <span class="status-dot"></span>
                ${s.online ? "Online" : "Offline"}
              </span>
            </div>
            <div class="readings">
              <div class="reading">
                <div class="reading-label">Temperature</div>
                <div class="reading-value">
                  ${s.temperature != null ? s.temperature.toFixed(1) : "&mdash;"}
                  <span class="unit">&deg;C</span>
                </div>
              </div>
              <div class="reading">
                <div class="reading-label">Humidity</div>
                <div class="reading-value">
                  ${s.humidity != null ? s.humidity.toFixed(1) : "&mdash;"}
                  <span class="unit">%</span>
                </div>
              </div>
            </div>
            <div class="room-footer">
              Updated ${formatLastUpdated(s.lastUpdated)}
            </div>
          </div>
        `,
          )
          .join("");
      }

      async function update() {
        try {
          const { sensors } = await fetch("/data").then((r) => r.json());
          renderSensors(sensors);
        } catch (e) {
          console.error("Failed to fetch sensor data", e);
        }
      }

      update();
      setInterval(update, 3500);
    </script>
  </body>
</html>
