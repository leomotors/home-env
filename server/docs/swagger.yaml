basePath: /
definitions:
  DataResponse:
    properties:
      sensors:
        items:
          $ref: '#/definitions/SensorDetail'
        type: array
    required:
    - sensors
    type: object
  SensorDetail:
    properties:
      humidity:
        example: 48.2
        type: number
      id:
        example: main_room
        type: string
      lastUpdated:
        example: 2.14
        type: number
      name:
        example: Office Room
        type: string
      online:
        example: true
        type: boolean
      temperature:
        example: 25.5
        type: number
    required:
    - id
    - lastUpdated
    - name
    - online
    type: object
  UpdateRequest:
    properties:
      humidity:
        example: 50
        type: number
      sensorId:
        example: main_room
        type: string
      temperature:
        example: 24.5
        type: number
    required:
    - humidity
    - sensorId
    - temperature
    type: object
host: localhost:8939
info:
  contact: {}
  description: Home environment sensor monitoring API
  title: Home Env API
  version: 3.1.0
paths:
  /data:
    get:
      description: Returns the latest temperature and humidity readings from all sensors
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/DataResponse'
      summary: Get all sensor data
  /update:
    post:
      consumes:
      - application/json
      description: Receives temperature and humidity data from an ESP32 sensor. Local
        network only.
      parameters:
      - description: Password for authentication
        in: header
        name: Authorization
        required: true
        type: string
      - description: Sensor reading data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/UpdateRequest'
      responses:
        "202":
          description: Accepted
        "400":
          description: Invalid request body or values out of range
        "401":
          description: Unauthorized
        "404":
          description: Sensor not found
      summary: Update sensor data
swagger: "2.0"
